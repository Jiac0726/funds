server {
    listen 443 ssl;
    server_name gskj.cloud www.gskj.cloud;

    ssl_certificate /etc/letsencrypt/live/gskj.cloud/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/gskj.cloud/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    include /etc/nginx/snippets/funds-api.conf;

    location = / {
        default_type application/json;
        return 200 '{"ok":true,"service":"funds-api"}';
    }

    location / {
        return 404;
    }
}
